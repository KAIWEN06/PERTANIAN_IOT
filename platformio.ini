[platformio]
default_envs = nodemcuv2

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM9

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_port = COM3

[env:gateway]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<gateway/>

[env:node]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<node/>